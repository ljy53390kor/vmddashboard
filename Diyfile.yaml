name: vmddata-app
entrypoint: none
description: |
  VMD Dashboard
service_type: javascript-npm
properties:
- revision: master
  ingress:
    path: /vmddata-app
  npm:
    build_output: dist
  nginx:
    nginx.conf: |
      user  nginx;
      worker_processes  auto;

      error_log  /var/log/nginx/error.log warn;
      pid        /var/run/nginx.pid;

      events {
          worker_connections  1024;
      }

      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          add_header 'Access-Control-Allow-Origin' '*';
          log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';
          access_log  /var/log/nginx/access.log  main;
          sendfile        on;
          keepalive_timeout  65;
          server {
              listen 8080;
              listen [::]:8080;
              server_name vmddata-app;
              index  index.html index.htm;

              location /assets {
                  alias /usr/share/nginx/html/assets;
              }

              # 내부 Supabase Studio 프록시 (계정 관리용)
              location /vmddata-app/studio/ {
                  proxy_pass http://vmddata-supabase-studio.diy-model.svc.cluster.local:3000/;
                  proxy_set_header Host vmddata-supabase-studio.diy-model.svc.cluster.local;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
              # Studio(Next.js)가 절대경로로 요청하는 정적 자산/내부 API
              location /_next/ {
                  proxy_pass http://vmddata-supabase-studio.diy-model.svc.cluster.local:3000/_next/;
                  proxy_set_header Host vmddata-supabase-studio.diy-model.svc.cluster.local;
              }
              location /api/ {
                  proxy_pass http://vmddata-supabase-studio.diy-model.svc.cluster.local:3000/api/;
                  proxy_set_header Host vmddata-supabase-studio.diy-model.svc.cluster.local;
              }

              location /vmddata-app {
                  alias /usr/share/nginx/html;
                  try_files $uri $uri/ /index.html;
              }
          }
      }
