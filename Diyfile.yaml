name: vmddashboard
entrypoint: none
description: |
  vmddashboard
service_type: javascript-npm
properties:
- revision: master
  ingress:
    path: /vmddashboard
  npm:
    build_output: dist
  nginx:
    nginx.conf: |
      user  nginx;
      worker_processes  auto;

      error_log  /var/log/nginx/error.log warn;
      pid        /var/run/nginx.pid;

      events {
          worker_connections  1024;
      }

      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          add_header 'Access-Control-Allow-Origin' '*';
          log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';
          access_log  /var/log/nginx/access.log  main;
          sendfile        on;
          keepalive_timeout  65;
          # 시안 이미지 업로드(멀티파트) 및 app-data PUT이 기본 1MB 제한에
          # 걸려 조용히 413으로 실패하고, 다음 로드 때 저장 전 상태로 되돌아가
          # "사라진 것처럼" 보이는 문제 방지
          client_max_body_size 20m;
          # reverse proxy
          server {
              listen 8080;
              listen [::]:8080;
              server_name vmddashboard;
              root /usr/share/nginx/html;
              index index.html index.htm;

              # 내부 백엔드 API (vmddashboard-svc: FastAPI + MariaDB)
              location /vmddashboard/api/ {
                  proxy_pass http://vmddashboard-svc.diy-model.svc.cluster.local/vmddashboard-svc/;
                  proxy_set_header Host vmddashboard-svc.diy-model.svc.cluster.local;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }

              location /vmddashboard {
                  alias /usr/share/nginx/html;
                  index index.html;
                  try_files $uri $uri/ /vmddashboard/index.html;
              }
          }
      }
